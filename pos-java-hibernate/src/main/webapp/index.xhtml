<html xmlns="http://www.w3.org/1999/xhtml"
  xmlns:h="http://xmlns.jcp.org/jsf/html"
  xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Primeira Pagina JSF</title>
</h:head>

<body>
 	<h:form>
 		<h:panelGrid columns="2">
 			<h:outputLabel>ID:</h:outputLabel>
 			<h:inputText readonly="true" value="#{usuarioPessoaBean.pessoa.id}"/>
 			
 			<h:outputLabel>Nome:</h:outputLabel>
 			<h:inputText value="#{usuarioPessoaBean.pessoa.nome}"/>
 			
 			<h:outputLabel>Sobrenome:</h:outputLabel>
 			<h:inputText value="#{usuarioPessoaBean.pessoa.sobrenome}"/>
 			
 			<h:outputLabel>Idade:</h:outputLabel>
 			<h:inputText value="#{usuarioPessoaBean.pessoa.idade}"/>
 			
 			<h:outputLabel>Login:</h:outputLabel>
 			<h:inputText value="#{usuarioPessoaBean.pessoa.login}"/>
 			
 			<h:outputLabel>Senha:</h:outputLabel>
 			<h:inputSecret value="#{usuarioPessoaBean.pessoa.senha}"/>
 		</h:panelGrid>
 			<h:commandButton value="Salvar" action="#{usuarioPessoaBean.salvar}"/>
 			<h:commandButton value="Novo" action="#{usuarioPessoaBean.novo}"/>
 			<br/>
 			
 			
 			<h:dataTable value="#{usuarioPessoaBean.list}" var = "user" cellpadding="15" border="1">
 				<f:facet name="header">Lista de Usuários</f:facet>
 				<h:column>
 					<f:facet name="header">ID</f:facet>
 					<h:outputLabel value="#{user.id}"/>
 				</h:column>
 				
 				<h:column>
 					<f:facet name="header">Nome</f:facet>
 					<h:outputLabel value="#{user.nome}"/>
 				</h:column>
 				
 				<h:column>
 					<f:facet name="header">Sobrenome</f:facet>
 					<h:outputLabel value="#{user.sobrenome}"/>
 				</h:column>
 				
 				<h:column>
 					<f:facet name="header">Login</f:facet>
 					<h:outputLabel value="#{user.login}"/>
 				</h:column>
 				
 				<h:column>
 					<f:facet name="header">Idade</f:facet>
 					<h:outputLabel value="#{user.idade}"/>
 				</h:column>
 				
 				<h:column>
 					<f:facet name="header">Editar</f:facet>
 					<h:commandLink value="editar">
 						<f:setPropertyActionListener value="#{user}" target="#{usuarioPessoaBean.pessoa}"/>
 					</h:commandLink>
 				</h:column>
 			
 			</h:dataTable>
 	</h:form>   
</body>
</html>
